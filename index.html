<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medica System Lab (MSL)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260326-1" />
  </head>
  <body>
    <nav class="top-nav">
      <div class="top-nav__inner">
        <a href="#home">Home</a>
        <a href="#members">Members</a>
        <a href="#alumni">Alumni</a>
        <a href="#projects">Projects</a>
        <a href="#publications">Publications</a>
        <a href="#location">Location</a>
      </div>
    </nav>

    <header class="hero">
      <div class="hero__content">
        <p class="hero__tag">AI Research Group</p>
        <h1>Medica System Lab <span>(MSL)</span></h1>
        <p>
          성균관대학교 Medica System Lab은 의료 인공지능과 지능형 시스템을 중심으로,
          실제 문제 해결로 이어지는 학제적 AI 연구를 수행합니다.
        </p>
        <p id="hero-summary" class="hero__summary"></p>
        <div id="hero-stats" class="hero__stats" aria-label="MSL research stats"></div>
      </div>
      <div class="hero__brand" aria-label="Sungkyunkwan University">
        <div class="hero__brand-glow" aria-hidden="true"></div>
        <img class="hero__logo" src="assets/images/Emblem_01.jpg" alt="Sungkyunkwan University emblem" />
        <p class="hero__brand-text">Sungkyunkwan University</p>
      </div>
    </header>

    <main>
      <div id="news-root"></div>
      <div id="research-root"></div>
      <div id="members-root"></div>
      <div id="alumni-root"></div>
      <div id="projects-root"></div>
      <div id="location-root"></div>

      <section class="panel publications-panel" id="publications">
        <div class="panel-head">
          <h2>Publications</h2>
          <p>저널, 컨퍼런스, 특허를 연도별로 관리하는 섹션입니다.</p>
        </div>

        <div class="pub-type-tabs" role="tablist" aria-label="Publication Types">
          <button class="pub-tab is-active" type="button" data-type="journal" role="tab" aria-selected="true">
            Journal
          </button>
          <button class="pub-tab" type="button" data-type="conference" role="tab" aria-selected="false">
            Conference
          </button>
          <button class="pub-tab" type="button" data-type="patent" role="tab" aria-selected="false">
            Patent
          </button>
        </div>

        <div class="pub-board card">
          <div id="pub-list" class="pub-list" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 Medica System Lab (MSL)</p>
    </footer>

    <div class="lightbox" id="image-lightbox" aria-hidden="true">
      <button class="lightbox__close" id="lightbox-close" type="button" aria-label="Close image">Close</button>
      <div class="lightbox__dialog" role="dialog" aria-modal="true" aria-label="Expanded research image">
        <img class="lightbox__image" id="lightbox-image" alt="" />
      </div>
    </div>

    <script src="site-data.js"></script>
    <script src="publications.js?v=20260326-1"></script>
    <script src="render-sections.js?v=20260326-1"></script>
  </body>
</html>
