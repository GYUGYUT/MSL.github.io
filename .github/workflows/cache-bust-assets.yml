name: Cache Bust Assets

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-asset-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update asset version tokens
        run: |
          VERSION="$(date -u +%Y%m%d%H%M%S)"
          perl -0pi -e "s/styles\.css\?v=\d[\d-]*/styles.css?v=$VERSION/g" index.html
          perl -0pi -e "s/site-data\.js\?v=\d[\d-]*/site-data.js?v=$VERSION/g" index.html
          perl -0pi -e "s/publications\.js\?v=\d[\d-]*/publications.js?v=$VERSION/g" index.html
          perl -0pi -e "s/render-sections\.js\?v=\d[\d-]*/render-sections.js?v=$VERSION/g" index.html

      - name: Commit updated asset version
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: bump asset version [skip ci]"
          git push origin HEAD:main
